<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CropGuard - Tomato Disease Identifier</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</head>
<body>

<!-- NAVBAR: Logo + Home link only -->
<nav class="topnav">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="nav-brand" href="/">
            <div class="nav-logo"><i class="bi bi-flower2"></i></div>
            <span>CropGuard</span>
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link-item">
                <i class="bi bi-house me-1"></i>Home
            </a>
        </div>
    </div>
</nav>

<!-- FLASH MESSAGES -->
<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show mt-3 rounded-3">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</div>

<main>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<!-- FOOTER: Copyright only -->
<footer class="site-footer">
    <div class="container text-center">
        <span>&copy; 2026 CropGuard. All rights reserved.</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
